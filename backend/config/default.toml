# =============================================================================
# jobs-finder — Backend non-secret default configuration
# =============================================================================
#
# Values are loaded by `load_settings()` into `os.environ` BEFORE
# pydantic-settings constructs the `Settings` instance. The precedence is:
#
#   env vars (already set)  >  this TOML  >  field defaults in config.py
#
# Operators can override locally with `config/local.toml` (gitignored).
# Use `.env` (gitignored) for secrets and per-environment switches.
#
# Each key is the uppercase env-var name read by `Settings`. Flat
# structure (no `[section]` headers) — the helper does
# `tomllib.load(path)` and expects a single-level table.
#
# JSON-list / JSON-dict fields are written as JSON strings (single-
# quoted TOML literal strings) so the existing `mode="before"`
# validators in `config.py` parse them unchanged.
# =============================================================================


